<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>善緣 · 在這裡陪你</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🪷</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Serif TC', Georgia, serif;
  /* 宣紙米白底——帶一點溫暖的灰褐 */
  background-color: #ede6d8;
  background-image:
    radial-gradient(ellipse at 12% 18%, rgba(140,160,130,0.12) 0%, transparent 48%),
    radial-gradient(ellipse at 82% 72%, rgba(175,150,120,0.11) 0%, transparent 48%),
    radial-gradient(ellipse at 50% 50%, rgba(200,190,170,0.06) 0%, transparent 70%);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ── 水墨荷花背景（SVG inline，低調） ── */
#lotus-bg {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%; height: 580px;
  pointer-events: none;
  z-index: 0;
  opacity: 0.90;
}

/* ── 頂部標題 ── */
header {
  flex-shrink: 0;
  background: rgba(242,236,226,0.92);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid rgba(170,155,130,0.28);
  box-shadow: 0 1px 18px rgba(120,100,80,0.07);
  z-index: 10;
  position: relative;
}

.header-main {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 13px 16px 5px;
  gap: 16px;
}
.header-deco-line {
  flex: 1;
  max-width: 90px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(150,130,100,0.45), transparent);
}
.header-title {
  font-size: 22px;
  font-weight: 400;
  letter-spacing: 0.5em;
  color: #3a3228;
  text-shadow: 0 1px 2px rgba(100,80,60,0.12);
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-lotus {
  font-size: 20px;
  letter-spacing: 0;
  line-height: 1;
  filter: drop-shadow(0 1px 2px rgba(160,100,100,0.18));
}
.header-lotus-svg {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  filter: drop-shadow(0 1px 3px rgba(180,80,100,0.22));
}
.header-sub {
  text-align: center;
  font-size: 10.5px;
  color: #8a806e;
  letter-spacing: 0.3em;
  padding-bottom: 10px;
}

/* 摺疊介紹 */
.info-bar {
  background: rgba(238,232,220,0.95);
  border-top: 1px solid rgba(170,155,130,0.2);
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.35s ease;
}
.info-bar.open { max-height: 260px; }
.info-bar-inner {
  display: flex;
  padding: 16px 24px;
  max-width: 700px;
  margin: 0 auto;
  gap: 0;
}
.info-section {
  flex: 1;
  font-size: 12px;
  color: #524840;
  line-height: 1.95;
  padding: 0 16px;
  border-right: 1px solid rgba(170,155,130,0.28);
}
.info-section:last-child { border-right: none; }
.info-section strong {
  color: #6a5a40;
  display: block;
  margin-bottom: 4px;
  font-size: 11.5px;
  letter-spacing: 0.08em;
}

.btn-info {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-60%);
  background: none;
  border: 1px solid rgba(150,130,100,0.4);
  border-radius: 12px;
  color: #6a5a40;
  font-size: 11px;
  padding: 3px 12px;
  cursor: pointer;
  font-family: 'Noto Serif TC', serif;
  letter-spacing: 0.05em;
  transition: all 0.2s;
}
.btn-info:hover { background: rgba(150,130,100,0.08); }

/* ── 對話區 ── */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 22px 16px 10px;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 1;
  /* 自訂捲軸 */
  scrollbar-width: thin;
  scrollbar-color: rgba(150,130,100,0.25) transparent;
}
#chat::-webkit-scrollbar { width: 5px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: rgba(150,130,100,0.25); border-radius: 10px; }

.chat-inner {
  width: 100%;
  max-width: 640px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── 訊息泡泡 ── */
.msg {
  max-width: 74%;
  padding: 14px 18px;
  font-size: 15.5px;
  line-height: 1.95;
  color: #2e2820;
  word-break: break-word;
  border-radius: 4px;
}

/* 善緣訊息：接近宣紙白，帶淡墨邊 */
.msg.assistant {
  align-self: flex-start;
  background: rgba(252,248,240,0.96);
  border-left: 3px solid rgba(160,130,90,0.55);
  border-top: 1px solid rgba(170,155,130,0.25);
  border-right: 1px solid rgba(170,155,130,0.15);
  border-bottom: 1px solid rgba(170,155,130,0.15);
  border-radius: 0 8px 8px 0;
  box-shadow: 2px 3px 16px rgba(100,80,60,0.08), 0 1px 3px rgba(100,80,60,0.05);
}

/* 使用者訊息：極淡青綠，像竹簡 */
.msg.user {
  align-self: flex-end;
  background: rgba(228,238,228,0.88);
  border-right: 3px solid rgba(100,135,100,0.50);
  border-top: 1px solid rgba(140,165,135,0.25);
  border-left: 1px solid rgba(140,165,135,0.15);
  border-bottom: 1px solid rgba(140,165,135,0.15);
  border-radius: 8px 0 0 8px;
  box-shadow: -2px 3px 16px rgba(80,100,80,0.08);
}

.msg-label {
  display: block;
  font-size: 11px;
  color: #8a7055;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}

/* 打字動畫 */
.typing-wrap { align-self: flex-start; }
.typing {
  display: inline-flex;
  gap: 6px;
  align-items: center;
  padding: 14px 20px;
  background: rgba(252,248,240,0.96);
  border-left: 3px solid rgba(160,130,90,0.55);
  border-top: 1px solid rgba(170,155,130,0.25);
  border-right: 1px solid rgba(170,155,130,0.15);
  border-bottom: 1px solid rgba(170,155,130,0.15);
  border-radius: 0 8px 8px 0;
  box-shadow: 2px 3px 16px rgba(100,80,60,0.08);
}
.typing span {
  width: 7px; height: 7px;
  background: rgba(140,115,80,0.55);
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.22s; }
.typing span:nth-child(3) { animation-delay: 0.44s; }
@keyframes bounce {
  0%,80%,100% { transform:translateY(0); opacity:0.5; }
  40% { transform:translateY(-6px); opacity:1; }
}

/* 祈福禮——捲軸感卡片 */
.blessing {
  align-self: center;
  width: 92%;
  background: linear-gradient(160deg,
    rgba(252,248,238,0.97) 0%,
    rgba(244,236,220,0.95) 100%);
  border: 1px solid rgba(170,145,100,0.35);
  border-left: 4px solid rgba(160,130,80,0.6);
  border-right: 4px solid rgba(160,130,80,0.6);
  border-radius: 2px;
  padding: 22px 28px;
  text-align: center;
  box-shadow: 0 4px 24px rgba(100,80,50,0.1), 0 1px 4px rgba(100,80,50,0.06);
  position: relative;
}
.blessing::before, .blessing::after {
  content: "❧";
  position: absolute;
  top: 10px;
  color: rgba(150,120,70,0.4);
  font-size: 14px;
}
.blessing::before { left: 14px; }
.blessing::after { right: 14px; }
.blessing-icon { font-size: 20px; display: block; margin-bottom: 10px; opacity: 0.8; }
.blessing-label {
  font-size: 10px;
  color: #8a7050;
  letter-spacing: 0.4em;
  margin-bottom: 14px;
}
.blessing-quote {
  font-size: 15px;
  color: #3a3020;
  line-height: 2.2;
  font-weight: 400;
}
.blessing-source {
  font-size: 11px;
  color: #8a7050;
  margin-top: 12px;
  letter-spacing: 0.06em;
}

/* ── 底部輸入 ── */
footer {
  flex-shrink: 0;
  background: rgba(238,232,220,0.95);
  backdrop-filter: blur(6px);
  border-top: 1px solid rgba(170,155,130,0.28);
  box-shadow: 0 -2px 16px rgba(100,80,60,0.06);
  padding: 10px 14px 14px;
  position: relative;
  z-index: 10;
}

#record-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 6px 14px;
  margin-bottom: 8px;
  background: rgba(245,232,228,0.9);
  border: 1px solid rgba(190,150,140,0.4);
  border-radius: 4px;
  font-size: 13px;
  color: #7a4a40;
  max-width: 640px;
  margin-left: auto;
  margin-right: auto;
}
#record-bar.show { display: flex; }
.rec-dot {
  width: 8px; height: 8px;
  background: #b05050;
  border-radius: 50%;
  animation: blink 1s infinite;
  flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
#rec-timer { font-variant-numeric: tabular-nums; }
.btn-rec-stop {
  margin-left: auto;
  background: #9a4840;
  color: rgba(252,248,240,0.95);
  border: none;
  border-radius: 4px;
  padding: 4px 14px;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Noto Serif TC', serif;
  letter-spacing: 0.06em;
}

.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  max-width: 640px;
  margin: 0 auto;
}

textarea#text-input {
  flex: 1;
  font-family: 'Noto Serif TC', serif;
  font-size: 15px;
  color: #2e2820;
  background: rgba(252,248,240,0.97);
  border: 1px solid rgba(170,150,115,0.45);
  border-radius: 4px;
  padding: 12px 16px;
  resize: none;
  outline: none;
  min-height: 48px;
  max-height: 130px;
  line-height: 1.7;
  box-shadow: inset 0 1px 4px rgba(100,80,60,0.05);
  transition: border-color 0.2s, box-shadow 0.2s;
}
textarea#text-input:focus {
  border-color: rgba(140,115,80,0.65);
  box-shadow: inset 0 1px 4px rgba(100,80,60,0.04), 0 0 0 3px rgba(140,115,80,0.1);
}
textarea#text-input::placeholder { color: #b0a088; }

.icon-btn {
  width: 48px; height: 48px;
  border-radius: 4px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  transition: all 0.2s;
  border: 1px solid;
}
.btn-send {
  background: linear-gradient(160deg, rgba(100,130,95,0.85), rgba(80,110,75,0.9));
  border-color: rgba(80,110,75,0.6);
  font-size: 17px;
  color: rgba(248,244,236,0.95);
  box-shadow: 0 2px 8px rgba(60,90,60,0.18);
}
.btn-send:hover { background: linear-gradient(160deg, rgba(85,115,80,0.9), rgba(65,95,60,0.95)); transform: translateY(-1px); }
.btn-send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

.btn-voice {
  background: rgba(248,244,236,0.92);
  border-color: rgba(170,150,115,0.45);
  box-shadow: 0 2px 6px rgba(100,80,60,0.1);
}
.btn-voice:hover { background: rgba(238,232,220,0.95); transform: translateY(-1px); }
.btn-voice:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.btn-voice.recording {
  background: rgba(245,228,225,0.95);
  border-color: rgba(180,110,100,0.6);
  animation: pulse 1.4s infinite;
}
@keyframes pulse {
  0%,100%{ box-shadow: 0 0 0 0 rgba(180,100,90,0.2); }
  50%{ box-shadow: 0 0 0 8px rgba(180,100,90,0); }
}

.hint { height: 0; overflow: hidden; }

.toast {
  position: fixed;
  bottom: 100px; left: 50%;
  transform: translateX(-50%);
  background: rgba(40,35,28,0.88);
  color: rgba(248,244,236,0.95);
  padding: 9px 22px;
  border-radius: 4px;
  font-size: 13px;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

@media (max-width: 600px) {
  .msg { max-width: 90%; font-size: 15px; }
  .btn-info { display: none; }
  .info-bar { display: none; }
  #lotus-bg { width: 280px; height: 340px; opacity: 0.7; }
}
</style>
</head>
<body>

<!-- 水墨荷花背景 SVG -->
<svg id="lotus-bg" aria-hidden="true" viewBox="0 0 1200 580"
  xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax meet">
  <defs>
    <!-- 荷葉：深墨綠，略帶透明 -->
    <radialGradient id="gl1" cx="38%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#5a6b4a" stop-opacity="0.52"/>
      <stop offset="55%"  stop-color="#3d5030" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#243020" stop-opacity="0.10"/>
    </radialGradient>
    <radialGradient id="gl2" cx="42%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#4a5c3c" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#263520" stop-opacity="0.08"/>
    </radialGradient>
    <!-- 花瓣：極淡墨粉，接近宣紙本色，帶一絲胭脂 -->
    <radialGradient id="gp1" cx="50%" cy="65%" r="58%">
      <stop offset="0%"   stop-color="#c8a8b2" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#b89098" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#a07880" stop-opacity="0.05"/>
    </radialGradient>
    <radialGradient id="gp2" cx="50%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#d8b8c0" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#b08890" stop-opacity="0.08"/>
    </radialGradient>
    <!-- 花苞 -->
    <radialGradient id="gb1" cx="50%" cy="28%" r="60%">
      <stop offset="0%"   stop-color="#c8a8b0" stop-opacity="0.68"/>
      <stop offset="100%" stop-color="#987080" stop-opacity="0.12"/>
    </radialGradient>
    <!-- 水波 -->
    <linearGradient id="gwl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7a9090" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#7a9090" stop-opacity="0.14"/>
      <stop offset="70%"  stop-color="#7a9090" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7a9090" stop-opacity="0"/>
    </linearGradient>
    <!-- 墨韻模糊（輕微，保留筆觸邊） -->
    <filter id="inkf" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
    <filter id="inkf2" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <!-- 暈染效果：更軟 -->
    <filter id="wash" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <!-- ────── 水紋（全寬，清晰可見） ────── -->
  <g opacity="0.60">
    <path d="M 0 498 Q 200 489 400 498 Q 600 507 800 498 Q 1000 489 1200 498"
      stroke="url(#gwl)" stroke-width="1.8" fill="none"/>
    <path d="M 0 520 Q 200 511 400 520 Q 600 529 800 520 Q 1000 511 1200 520"
      stroke="url(#gwl)" stroke-width="1.5" fill="none"/>
    <path d="M 0 542 Q 200 533 400 542 Q 600 551 800 542 Q 1000 533 1200 542"
      stroke="url(#gwl)" stroke-width="1.3" fill="none"/>
    <path d="M 0 562 Q 200 554 400 562 Q 600 570 800 562 Q 1000 554 1200 562"
      stroke="url(#gwl)" stroke-width="1.1" fill="none"/>
    <path d="M 0 476 Q 200 468 400 476 Q 600 484 800 476 Q 1000 468 1200 476"
      stroke="url(#gwl)" stroke-width="1.0" fill="none" opacity="0.75"/>
    <path d="M 0 453 Q 200 446 400 453 Q 600 460 800 453 Q 1000 446 1200 453"
      stroke="url(#gwl)" stroke-width="0.8" fill="none" opacity="0.50"/>
  </g>

  <!-- ════════ 左下角：浮水小荷葉 + 蓮藕 ════════ -->
  <!-- 左下浮水荷葉（較大，水面上） -->
  <g filter="url(#wash)" opacity="0.55">
    <ellipse cx="110" cy="525" rx="88" ry="62"
      fill="url(#gl1)" transform="rotate(10,110,525)"/>
  </g>
  <g filter="url(#inkf2)" opacity="0.58">
    <path d="M 110 462 C 108 485 108 505 110 525"
      stroke="#2a3820" stroke-width="1.1" fill="none"/>
    <path d="M 110 490 C 75 494 42 502 15 510" stroke="#2a3820" stroke-width="0.8" fill="none" opacity="0.65"/>
    <path d="M 110 490 C 140 486 168 482 192 478" stroke="#2a3820" stroke-width="0.8" fill="none" opacity="0.65"/>
    <path d="M 110 510 C 68 516 30 524 5 530" stroke="#2a3820" stroke-width="0.7" fill="none" opacity="0.55"/>
    <path d="M 110 510 C 148 506 180 500 205 495" stroke="#2a3820" stroke-width="0.7" fill="none" opacity="0.55"/>
    <path d="M 110 525 C 72 530 38 536 10 540" stroke="#2a3820" stroke-width="0.6" fill="none" opacity="0.42"/>
    <!-- 葉緣微捲 -->
    <path d="M 18 512 C 32 500 44 506" stroke="#2a3820" stroke-width="1.0" fill="none" opacity="0.48"/>
  </g>
  <!-- 左下荷莖 -->
  <path d="M 110 580 C 110 563 110 544 110 525"
    stroke="#3a4830" stroke-width="2.2" fill="none" stroke-linecap="round"
    opacity="0.45" filter="url(#inkf)"/>

  <!-- 第二片小荷葉（左側更小，疊層） -->
  <g filter="url(#wash)" opacity="0.38">
    <ellipse cx="205" cy="548" rx="58" ry="42"
      fill="url(#gl2)" transform="rotate(-6,205,548)"/>
  </g>
  <g filter="url(#inkf2)" opacity="0.42">
    <path d="M 205 505 C 204 522 204 536 205 548"
      stroke="#2a3820" stroke-width="0.9" fill="none"/>
    <path d="M 205 528 C 178 532 155 538 136 542" stroke="#2a3820" stroke-width="0.6" fill="none" opacity="0.50"/>
    <path d="M 205 528 C 228 524 250 518 268 514" stroke="#2a3820" stroke-width="0.6" fill="none" opacity="0.50"/>
  </g>
  <path d="M 205 580 C 204 568 204 556 205 548"
    stroke="#3a4830" stroke-width="1.7" fill="none" stroke-linecap="round"
    opacity="0.35" filter="url(#inkf)"/>

  <!-- 蓮藕（水下隱約可見，偏墨） -->
  <g opacity="0.42" filter="url(#inkf)">
    <ellipse cx="90" cy="562" rx="22" ry="12"
      fill="#a09058" fill-opacity="0.72" transform="rotate(-10,90,562)"/>
    <ellipse cx="128" cy="567" rx="20" ry="11"
      fill="#a09058" fill-opacity="0.68" transform="rotate(-8,128,567)"/>
    <ellipse cx="56" cy="569" rx="18" ry="10"
      fill="#a09058" fill-opacity="0.62" transform="rotate(-13,56,569)"/>
    <!-- 藕節縊縮 -->
    <path d="M 68 560 C 70 564 68 568" stroke="#605830" stroke-width="2.2" fill="none" opacity="0.58"/>
    <path d="M 109 563 C 111 567 109 570" stroke="#605830" stroke-width="2.0" fill="none" opacity="0.52"/>
    <!-- 藕孔 -->
    <circle cx="84" cy="562" r="3" fill="#503820" fill-opacity="0.42"/>
    <circle cx="94" cy="561" r="2.4" fill="#503820" fill-opacity="0.38"/>
    <circle cx="122" cy="566" r="2.8" fill="#503820" fill-opacity="0.40"/>
    <circle cx="132" cy="565" r="2.2" fill="#503820" fill-opacity="0.35"/>
    <!-- 根鬚 -->
    <path d="M 72 573 C 71 577 70 581" stroke="#504030" stroke-width="0.8" fill="none" opacity="0.55"/>
    <path d="M 98 573 C 97 578 98 582" stroke="#504030" stroke-width="0.8" fill="none" opacity="0.52"/>
    <path d="M 126 574 C 125 579 126 583" stroke="#504030" stroke-width="0.8" fill="none" opacity="0.48"/>
    <path d="M 50 575 C 48 580 49 584" stroke="#504030" stroke-width="0.7" fill="none" opacity="0.42"/>
  </g>

  <!-- ════════ 右側：荷莖、荷葉、荷花（x全部 +720） ════════ -->
  <!-- 主莖：粗，帶節 -->
  <g filter="url(#inkf)">
    <path d="M 1010 580 C 1008 545 1005 510 1000 470 C 995 435 988 405 998 368"
      stroke="#3a4830" stroke-width="3.8" fill="none" stroke-linecap="round" opacity="0.62"/>
    <ellipse cx="1002" cy="430" rx="5" ry="3.5" fill="#3a4830" opacity="0.28" transform="rotate(-5,1002,430)"/>
    <ellipse cx="999" cy="480" rx="4.5" ry="3" fill="#3a4830" opacity="0.22" transform="rotate(-3,999,480)"/>
  </g>
  <!-- 副莖：花苞 -->
  <path d="M 1110 580 C 1108 548 1102 518 1096 488 C 1092 465 1100 442 1108 418"

<!-- 頂部標題 -->
<header>
  <div class="header-main">
    <div class="header-deco-line"></div>
    <div class="header-title"><span class="header-lotus">🪷</span> 善 緣</div>
    <div class="header-deco-line"></div>
    <button class="btn-info" onclick="toggleInfo()" id="btn-info-toggle">關於善緣</button>
  </div>
  <div class="header-sub">在這裡陪你走一段路</div>

  <div class="info-bar" id="info-bar">
    <div class="info-bar-inner">
      <div class="info-section">
        <strong>🪷 善緣是誰</strong>
        深受人間佛教薰陶的在家陪伴者，在星雲大師智慧啟發下，用真誠、不評判的心陪伴每一個人。
      </div>
      <div class="info-section">
        <strong>💬 善緣怎麼陪你</strong>
        不論你有什麼信仰，只要想說說話，善緣都在。每次談話結束時，善緣會根據你們的對話，送上一句大師金言作為祈福，帶著走。
      </div>
      <div class="info-section">
        <strong>🙏 特別感謝</strong>
        感謝<strong>佛光山人間佛教研究院</strong>開放大師全集，支持「善緣」的誕生。🪷<br>
        感謝<strong>佛光大學特色研究專案</strong>支持本項目開發。
      </div>
    </div>
  </div>
</header>

<!-- 對話區 -->
<div id="chat">
  <div class="chat-inner" id="chat-inner"></div>
</div>

<!-- 底部輸入 -->
<footer>
  <div id="record-bar">
    <span class="rec-dot"></span>
    <span>錄音中</span>
    <span id="rec-timer">00:00</span>
    <button class="btn-rec-stop" onclick="stopRecording()">完成</button>
  </div>
  <div class="input-row">
    <button class="icon-btn btn-voice" id="btn-voice" onclick="toggleVoice()" title="語音輸入">🎙️</button>
    <textarea id="text-input" placeholder="想說什麼？" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="icon-btn btn-send" id="btn-send" onclick="sendText()" title="送出">↑</button>
  </div>
  <div class="hint" id="hint-text"></div>
</footer>

<div class="toast" id="toast"></div>

<script>
let messages = [];
let isStreaming = false;

window.addEventListener('DOMContentLoaded', () => {
  addMessage('assistant', '嗨，我是善緣。你今天過得怎麼樣？');
});

function toggleInfo() {
  const bar = document.getElementById('info-bar');
  const btn = document.getElementById('btn-info-toggle');
  const open = bar.classList.toggle('open');
  btn.textContent = open ? '收起' : '關於善緣';
}

function getChatInner() { return document.getElementById('chat-inner'); }

function addMessage(role, text) {
  const inner = getChatInner();
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'assistant') {
    const label = document.createElement('span');
    label.className = 'msg-label';
    label.textContent = '🪷 善緣';
    div.appendChild(label);
  }
  const content = document.createElement('span');
  content.className = 'msg-content';
  content.textContent = text;
  div.appendChild(content);
  inner.appendChild(div);
  scrollToBottom();
  return div;
}

function addTyping() {
  const inner = getChatInner();
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  inner.appendChild(wrap);
  scrollToBottom();
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function addBlessing(quote, title, book) {
  const inner = getChatInner();
  const div = document.createElement('div');
  div.className = 'blessing';
  const source = title ? `——〈${title}〉${book ? '《' + book + '》' : ''}` : '';
  div.innerHTML = `
    <span class="blessing-icon">🪷</span>
    <div class="blessing-label">✦ 善緣的祈福禮 ✦</div>
    <div class="blessing-quote">「${quote}」</div>
    ${source ? `<div class="blessing-source">${source}</div>` : ''}
  `;
  inner.appendChild(div);
  scrollToBottom();
}

function scrollToBottom() {
  const chat = document.getElementById('chat');
  chat.scrollTop = chat.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}
async function sendText() {
  if (isStreaming) return;
  const input = document.getElementById('text-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  await sendMessage(text);
}

async function sendMessage(userText) {
  if (isStreaming) return;
  isStreaming = true;
  setUIDisabled(true);
  addMessage('user', userText);
  messages.push({ role: 'user', content: userText });
  addTyping();
  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, user_text: userText }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    removeTyping();
    const msgDiv = addMessage('assistant', '');
    const contentSpan = msgDiv.querySelector('.msg-content');
    let fullText = '';
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.type === 'token') {
            fullText += data.text;
            contentSpan.textContent = fullText;
            scrollToBottom();
          } else if (data.type === 'blessing') {
            addBlessing(data.quote, data.title, data.book);
          } else if (data.type === 'done') {
            messages.push({ role: 'assistant', content: data.full });
          } else if (data.type === 'error') {
            contentSpan.textContent = `（連線出了點狀況：${data.message}）`;
          }
        } catch(e) {}
      }
    }
  } catch (e) {
    removeTyping();
    addMessage('assistant', `（連線出了點狀況：${e.message}）`);
  }
  isStreaming = false;
  setUIDisabled(false);
  document.getElementById('text-input').focus();
}

function setUIDisabled(d) {
  document.getElementById('btn-send').disabled = d;
  document.getElementById('btn-voice').disabled = d;
  document.getElementById('text-input').disabled = d;
}

let mediaRecorder = null;
let audioChunks = [];
let recInterval = null;
let recSeconds = 0;

function toggleVoice() {
  if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
  else startRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = []; recSeconds = 0;
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = handleRecordingDone;
    mediaRecorder.start();
    document.getElementById('btn-voice').classList.add('recording');
    document.getElementById('btn-voice').textContent = '⏹️';
    document.getElementById('record-bar').classList.add('show');
    recInterval = setInterval(() => {
      recSeconds++;
      const m = String(Math.floor(recSeconds / 60)).padStart(2, '0');
      const s = String(recSeconds % 60).padStart(2, '0');
      document.getElementById('rec-timer').textContent = `${m}:${s}`;
      if (recSeconds >= 120) stopRecording();
    }, 1000);
  } catch(e) {
    showToast('無法使用麥克風，請確認瀏覽器權限');
  }
}

function stopRecording() {
  if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());
  clearInterval(recInterval);
  document.getElementById('btn-voice').classList.remove('recording');
  document.getElementById('btn-voice').textContent = '🎙️';
  document.getElementById('record-bar').classList.remove('show');
  document.getElementById('btn-voice').disabled = true;
}

async function handleRecordingDone() {
  const blob = new Blob(audioChunks, { type: 'audio/wav' });
  const formData = new FormData();
  formData.append('file', blob, 'audio.wav');
  try {
    const resp = await fetch('/transcribe', { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.transcript) {
      document.getElementById('btn-voice').disabled = false;
      await sendMessage(data.transcript);
    } else {
      showToast(data.error || '辨識失敗，請再試一次');
      document.getElementById('btn-voice').disabled = false;
    }
  } catch(e) {
    showToast('辨識失敗：' + e.message);
    document.getElementById('btn-voice').disabled = false;
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
