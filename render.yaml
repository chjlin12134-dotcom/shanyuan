services:
  - type: web
    name: shanyuan
    runtime: python
    buildCommand: python -m venv .venv && .venv/bin/pip install -r requirements-render.txt
    startCommand: .venv/bin/uvicorn app_fastapi:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
    plan: free
